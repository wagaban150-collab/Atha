version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: atha-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-atha_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-atha_password}
      POSTGRES_DB: ${DB_NAME:-atha_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - atha-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-atha_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: atha-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - atha-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: atha-backend
    environment:
      NODE_ENV: development
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-atha_user}
      DB_PASSWORD: ${DB_PASSWORD:-atha_password}
      DB_NAME: ${DB_NAME:-atha_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - atha-network
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:

networks:
  atha-network:
    driver: bridge
