<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="joke-card">
            <h1>😂 Random Joke Generator</h1>
            
            <div class="joke-display">
                <p id="jokeText" class="joke-text">Click the button to get a joke!</p>
                <p id="jokeType" class="joke-type"></p>
            </div>
            
            <div class="button-group">
                <button id="getJokeBtn" class="btn btn-primary">Get a Joke</button>
                <button id="copyBtn" class="btn btn-secondary">Copy Joke</button>
            </div>
            
            <div class="category-filter">
                <label for="categorySelect">Select Category:</label>
                <select id="categorySelect">
                    <option value="">All Categories</option>
                    <option value="general">General</option>
                    <option value="knock-knock">Knock-Knock</option>
                    <option value="programming">Programming</option>
                </select>
            </div>
            
            <div class="loading" id="loading"></div>
            <div class="error" id="error"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
